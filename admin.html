<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 강남대성기숙 의대관</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue:      #0066cc;
      --blue-f:    #0071e3;
      --ink:       #1d1d1f;
      --ink-48:    #7a7a7a;
      --ink-muted: #6e6e73;
      --canvas:    #ffffff;
      --parchment: #f5f5f7;
      --nav-black: #000000;
      --hairline:  #e0e0e0;
      --divider:   #f0f0f0;
      --danger:    #d93025;
    }

    html { overflow-x: hidden; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--parchment);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.47;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }

    /* ── 로그인 화면 ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 18px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .login-logo img {
      height: 22px;
      object-fit: contain;
    }

    .login-title {
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -0.374px;
      color: var(--ink);
      text-align: center;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--ink-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: var(--canvas);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus {
      border-color: var(--blue);
      outline: 2px solid rgba(0,102,204,0.15);
      outline-offset: 0;
    }

    .btn-login {
      width: 100%;
      height: 44px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-login:hover { background: #333; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .login-error {
      display: none;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff5f4;
      border: 1px solid #fecaca;
      border-radius: 8px;
    }

    .login-error.show { display: block; }

    /* ── 로딩 스피너 ── */
    .spinner-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
      color: var(--ink-muted);
      font-size: 13px;
    }

    .spinner-wrap.show { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--hairline);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 관리자 앱 ── */
    #adminApp { display: none; }

    .admin-nav {
      background: var(--nav-black);
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left { display: flex; align-items: center; gap: 14px; }

    .nav-logo img {
      height: 20px;
      filter: brightness(0) invert(1);
    }

    .nav-badge {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
    }

    .nav-right { display: flex; align-items: center; gap: 10px; }

    .nav-user { font-size: 12px; color: rgba(255,255,255,0.65); }

    .nav-super {
      font-size: 10px; font-weight: 600;
      color: #fbbf24;
      background: rgba(251,191,36,0.15);
      padding: 2px 7px; border-radius: 4px;
    }

    .btn-logout {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 4px 12px;
      border-radius: 9999px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-logout:hover { color: #fff; border-color: rgba(255,255,255,0.45); }

    /* ── 대시보드 레이아웃 ── */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .page-title {
      font-size: 28px; font-weight: 600;
      letter-spacing: -0.374px;
      margin-bottom: 4px;
    }

    .page-sub { font-size: 13px; color: var(--ink-muted); margin-bottom: 28px; }

    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.6px; text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 10px; margin-top: 28px;
    }

    /* ── 통계 카드 ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 14px;
      padding: 20px 20px 16px;
    }

    .sc-num { font-size: 32px; font-weight: 600; letter-spacing: -0.374px; line-height: 1; }
    .sc-label { font-size: 13px; font-weight: 600; margin-top: 8px; }
    .sc-sub { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

    /* ── 카드 ── */
    .card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-head {
      height: 52px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--hairline);
      background: #d8d8dc;
    }

    .card-title { font-size: 15px; font-weight: 600; }

    .card-link {
      font-size: 13px; color: var(--blue);
      text-decoration: none; background: none; border: none; cursor: pointer;
    }

    /* ── 빠른 액션 ── */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 16px 20px;
    }

    .action-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 16px 12px;
      background: var(--parchment);
      border: 1px solid var(--hairline); border-radius: 10px;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .action-btn:hover { background: #e8e8ec; }
    .action-btn:active { transform: scale(0.97); }
    .action-icon { font-size: 24px; }
    .action-label { font-size: 13px; font-weight: 600; color: var(--ink); }
    .action-sub { font-size: 11px; color: var(--ink-muted); }

    /* ── 테이블 ── */
    .data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    .data-table th {
      padding: 9px 10px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      text-transform: uppercase; color: var(--ink-muted);
      text-align: center; background: var(--parchment);
      border-bottom: 1px solid var(--hairline);
    }

    .data-table td {
      padding: 12px 10px; font-size: 13px; text-align: center;
      border-bottom: 1px solid var(--divider);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* 제목·파일명 등 텍스트 컬럼만 좌측 정렬 + 여백 */
    .data-table th.col-l, .data-table td.col-l { text-align: left; padding-left: 16px; }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--parchment); }

    .td-muted { color: var(--ink-muted); }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
    }

    .b-pub   { background: #d1f5d3; color: #1a6625; }
    .b-hide  { background: var(--parchment); color: var(--ink-48); }
    .b-super { background: rgba(251,191,36,0.2); color: #92400e; }
    .b-admin { background: #dbeafe; color: #1e40af; }

    .empty-row td { padding: 28px 20px; text-align: center; color: var(--ink-muted); }

    /* ── 공지 관리 ── */
    .notice-mgmt-scroll {
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--hairline) transparent;
    }
    .notice-mgmt-scroll::-webkit-scrollbar { width: 4px; }
    .notice-mgmt-scroll::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 2px; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      font-size: 14px; padding: 2px 5px; border-radius: 4px; transition: background 0.15s;
    }
    .btn-icon:hover { background: var(--parchment); }
    .btn-add {
      font-size: 12px; font-weight: 600; font-family: inherit;
      background: var(--blue); color: #fff; border: none;
      padding: 5px 14px; border-radius: 9999px; cursor: pointer; transition: background 0.15s;
    }
    .btn-add:hover { background: var(--blue-f); }

    /* ── 편집 모달 ── */
    .edit-modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .edit-modal-box {
      background: var(--canvas); border-radius: 14px;
      padding: 28px 24px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .edit-label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-muted); margin-bottom: 5px; margin-top: 14px; }
    .edit-input { width: 100%; padding: 9px 12px; border: 1px solid var(--hairline); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--ink); background: var(--canvas); outline: none; transition: border-color 0.15s; }
    .edit-input:focus { border-color: var(--blue); }
    .edit-textarea { height: 140px; resize: vertical; }
    .edit-checks { display: flex; gap: 20px; margin-top: 14px; font-size: 13px; }
    .edit-checks label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .edit-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-save { flex: 1; height: 40px; background: var(--ink); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-save:hover { background: #333; }
    .btn-cancel { flex: 1; height: 40px; background: none; color: var(--ink-muted); border: 1px solid var(--hairline); border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; }
    .edit-error { display: none; font-size: 12px; color: var(--danger); margin-top: 8px; text-align: center; }
    .edit-error.show { display: block; }

    /* ── 주간공지 파일 업로드 ── */
    .upload-area {
      border: 2px dashed var(--hairline);
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin: 16px 20px;
    }
    .upload-area:hover, .upload-area.drag {
      border-color: var(--blue);
      background: rgba(0,102,204,0.04);
    }
    .upload-area input[type=file] { display: none; }
    .upload-label { font-size: 13px; color: var(--ink-muted); }
    .upload-progress {
      display: none; font-size: 12px; color: var(--blue);
      margin-top: 8px; text-align: center;
    }
    .upload-progress.show { display: block; }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .login-box { padding: 28px 20px; }
      .page-wrap { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     로그인 화면
══════════════════════════════════ -->
<div id="loginPage" class="login-page">
  <div class="login-box">

    <div class="login-logo">
      <img src="https://img.dshw.co.kr/resources/DESIGN/nimg/common/logo_campusm_202111.png"
           alt="대성기숙" onerror="this.style.display='none'">
    </div>

    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">강남대성기숙 의대관</div>

    <div class="form-group">
      <label class="form-label" for="inputId">관리자 ID</label>
      <input id="inputId" type="text" class="form-input"
             placeholder="아이디 입력" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label" for="inputPw">비밀번호</label>
      <input id="inputPw" type="password" class="form-input"
             placeholder="비밀번호 입력" autocomplete="current-password">
    </div>

    <button id="btnLogin" class="btn-login" onclick="doLogin()">로그인</button>

    <div id="loginError" class="login-error"></div>
    <div id="loginSpinner" class="spinner-wrap">
      <div class="spinner"></div>
      <span>확인 중...</span>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════
     관리자 대시보드
══════════════════════════════════ -->
<div id="adminApp">

  <nav class="admin-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <img src="https://img.dshw.co.kr/resources/DESIGN/nimg/common/logo_campusm_202111.png"
             alt="대성기숙" style="height:20px;filter:brightness(0) invert(1);"
             onerror="this.style.display='none'">
        <span class="nav-badge">Admin</span>
      </div>
      <div class="nav-right">
        <span class="nav-user" id="navName"></span>
        <button class="btn-logout" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">

    <div class="page-title">관리자 대시보드</div>
    <div class="page-sub" id="pageDate"></div>

    <!-- 통계 -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="sc-num" id="statToday">—</div>
        <div class="sc-label">오늘 등록 공지</div>
        <div class="sc-sub">건</div>
      </div>
    </div>

    <!-- 공지사항 CRUD -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">공지사항</span>
        <button class="btn-add" onclick="openNoticeEdit(0)">+ 등록</button>
      </div>
      <div class="notice-mgmt-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th class="col-l">제목</th>
              <th style="width:110px">등록일</th>
              <th style="width:56px">조회</th>
              <th style="width:52px">고정</th>
              <th style="width:52px">게시</th>
              <th style="width:56px">관리</th>
            </tr>
          </thead>
          <tbody id="noticeTbody">
            <tr class="empty-row"><td colspan="6">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 주간공지 관리 -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">주간공지</span>
        <button class="btn-add" onclick="openWeeklyUpload()">+ 파일 등록</button>
      </div>
      <div class="notice-mgmt-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th class="col-l">파일명</th>
              <th style="width:110px">등록일</th>
              <th style="width:56px">조회</th>
              <th style="width:52px">게시</th>
              <th style="width:52px">삭제</th>
            </tr>
          </thead>
          <tbody id="weeklyTbody">
            <tr class="empty-row"><td colspan="6">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 슈퍼관리자 전용 -->
    <div id="superSection" style="display:none">
      <div class="card">
        <div class="card-head"><span class="card-title">등록 관리자</span></div>
        <table class="data-table">
          <thead>
            <tr><th>이름</th><th>이메일</th><th>역할</th><th>마지막 로그인</th></tr>
          </thead>
          <tbody id="adminTbody">
            <tr class="empty-row"><td colspan="4">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ── 주간공지 업로드 모달 ── -->
<div id="weeklyUploadModal" class="edit-modal-backdrop" style="display:none" onclick="handleWeeklyUploadBackdrop(event)">
  <div class="edit-modal-box">
    <div style="font-size:17px;font-weight:600;margin-bottom:4px">주간공지 파일 등록</div>
    <div style="font-size:12px;color:var(--ink-muted);margin-bottom:14px">PDF 파일을 선택하면 자동으로 파일명이 제목으로 등록됩니다</div>

    <div class="upload-area" id="weeklyDropArea"
         onclick="document.getElementById('weeklyFileInput').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleWeeklyDrop(event)">
      <input type="file" id="weeklyFileInput" accept=".pdf,application/pdf" onchange="handleWeeklyFileSelect(event)">
      <div class="upload-label">
        <div style="font-size:32px;margin-bottom:8px">📄</div>
        <div style="font-weight:600;margin-bottom:4px">PDF 파일 선택</div>
        <div>클릭하거나 파일을 여기로 끌어다 놓으세요</div>
        <div style="margin-top:6px;font-size:11px">최대 10MB · PDF만 허용</div>
      </div>
    </div>

    <div id="weeklySelectedName" style="display:none;font-size:13px;font-weight:600;padding:8px 4px;color:var(--ink)"></div>
    <div id="weeklyUploadProgress" class="upload-progress"></div>

    <div class="edit-actions">
      <button class="btn-save" id="weeklyUploadBtn" onclick="uploadWeeklyFile()" disabled style="opacity:0.45">업로드</button>
      <button class="btn-cancel" onclick="closeWeeklyUpload()">취소</button>
    </div>
    <div class="edit-error" id="weeklyUploadError"></div>
  </div>
</div>

<!-- ── 공지 편집 모달 ── -->
<div id="noticeEditModal" class="edit-modal-backdrop" style="display:none" onclick="handleEditBackdrop(event)">
  <div class="edit-modal-box">
    <div style="font-size:17px;font-weight:600;margin-bottom:4px;" id="editModalTitle">공지 등록</div>
    <input type="hidden" id="editId" value="0">

    <label class="edit-label">제목</label>
    <input id="editTitle" type="text" class="edit-input" placeholder="제목 입력" maxlength="200">

    <label class="edit-label">내용</label>
    <textarea id="editBody" class="edit-input edit-textarea" placeholder="내용 입력"></textarea>

    <label class="edit-label">작성자</label>
    <input id="editOwner" type="text" class="edit-input" placeholder="작성자 이름" maxlength="50">

    <div class="edit-checks">
      <label><input type="checkbox" id="editPin"> 고정</label>
      <label><input type="checkbox" id="editHidden"> 비공개</label>
    </div>

    <div class="edit-actions">
      <button class="btn-save"   onclick="saveNotice()">저장</button>
      <button class="btn-cancel" onclick="closeNoticeEdit()">취소</button>
    </div>
    <div class="edit-error" id="editError"></div>
    <div class="spinner-wrap" id="editSpinner"><div class="spinner"></div><span>저장 중...</span></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// Supabase 설정 (index.html과 동일한 anon key 사용)
// ══════════════════════════════════════════════
const SUPABASE_URL     = 'https://rwplqifhmlduukipnksm.supabase.co';
const SUPABASE_ANON    = 'sb_publishable_lbs8wxKQiAH_ZjjWA5EjaQ_IGAc3voJ';

async function callRpc(func, params) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + func, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(params)
    });
    if (!res.ok) { var err = await res.text(); console.error('[RPC]', func, res.status, err); return null; }
    return await res.json();
  } catch(e) { return null; }
}

// ─────────────────────────────────────────────
// 공지사항 CRUD
// ─────────────────────────────────────────────
var _adminNotices = [];

async function loadAdminNotices() {
  var adminId = getAdminId();
  if (!adminId) return;
  var list = await callRpc('get_notices_admin', { p_session_token: getToken() });
  if (!Array.isArray(list)) return;
  _adminNotices = list;
  renderAdminNoticeTable(list);
}

function renderAdminNoticeTable(list) {
  var tbody = document.getElementById('noticeTbody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">공지사항이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = list.slice(0,10).map(function(r) {
    var date = r.textnotice_date ? r.textnotice_date.substring(0,10) : '—';
    var pinTxt = r.textnotice_pin    ? '📌' : '—';
    var pubTxt = r.textnotice_hidden ? '🔒' : '✅';
    return '<tr>'
      + '<td class="col-l" style="cursor:pointer" onclick="openNoticeEdit(' + r.textnotice_id + ')" title="' + esc(r.textnotice_title || '') + '">'
        + esc(r.textnotice_title || '') + '</td>'
      + '<td class="td-muted">' + date + '</td>'
      + '<td>' + (r.textnotice_readcnt || 0) + '</td>'
      + '<td>' + pinTxt + '</td>'
      + '<td>' + pubTxt + '</td>'
      + '<td><button class="btn-icon" onclick="deleteNotice(' + r.textnotice_id + ')">🗑️</button></td>'
      + '</tr>';
  }).join('');
}

// 공지 편집 모달 열기 (id=0 이면 신규)
function openNoticeEdit(id) {
  var r = id ? _adminNotices.find(function(x) { return x.textnotice_id === id; }) : null;
  document.getElementById('editModalTitle').textContent = r ? '공지 수정' : '공지 등록';
  document.getElementById('editId').value    = r ? r.textnotice_id : 0;
  document.getElementById('editTitle').value = r ? (r.textnotice_title  || '') : '';
  document.getElementById('editBody').value  = r ? (r.textnotice_body   || '') : '';
  document.getElementById('editOwner').value = r ? (r.textnotice_owner  || '') : getAdminId();
  document.getElementById('editPin').checked    = r ? !!r.textnotice_pin    : false;
  document.getElementById('editHidden').checked = r ? !!r.textnotice_hidden : false;

  document.getElementById('editError').className = 'edit-error';
  document.getElementById('editSpinner').className = 'spinner-wrap';
  document.getElementById('noticeEditModal').style.display = 'flex';
}

function closeNoticeEdit() {
  document.getElementById('noticeEditModal').style.display = 'none';
}

function handleEditBackdrop(e) {
  if (e.target === document.getElementById('noticeEditModal')) closeNoticeEdit();
}

async function saveNotice() {
  var id     = parseInt(document.getElementById('editId').value) || 0;
  var title  = document.getElementById('editTitle').value.trim();
  var body   = document.getElementById('editBody').value.trim();
  var owner  = document.getElementById('editOwner').value.trim();
  var pin    = document.getElementById('editPin').checked;
  var hidden = document.getElementById('editHidden').checked;

  if (!title) { showEditError('제목을 입력하세요'); return; }

  var sp = document.getElementById('editSpinner');
  sp.className = 'spinner-wrap show';

  var r = await callRpc('save_notice', {
    p_session_token: getToken(), p_id: id,
    p_title: title, p_body: body, p_owner: owner,
    p_hidden: hidden, p_pin: pin
  });

  sp.className = 'spinner-wrap';
  if (!r || !r.success) { showEditError('저장 실패: ' + (r && r.error || '서버 오류')); return; }
  closeNoticeEdit();
  loadAdminNotices();
}

async function deleteNotice(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  var r = await callRpc('delete_notice', { p_session_token: getToken(), p_id: id });
  if (r && r.success) loadAdminNotices();
  else alert('삭제 실패');
}

function showEditError(msg) {
  var el = document.getElementById('editError');
  el.textContent = msg; el.className = 'edit-error show';
}

// ─────────────────────────────────────────────
// 주간공지 관리
// ─────────────────────────────────────────────
var _weeklyFile = null;

async function loadAdminWeekly() {
  var list = await callRpc('get_weekly_admin', { p_session_token: getToken() });
  if (!Array.isArray(list)) return;
  renderAdminWeeklyTable(list);
}

function renderAdminWeeklyTable(list) {
  var tbody = document.getElementById('weeklyTbody');
  if (!list.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">등록된 주간공지가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(r) {
    var date   = r.wn_date ? r.wn_date.substring(0,10) : '—';
    var pubTxt = r.wn_hidden ? '🔒' : '✅';
    return '<tr>'
      + '<td style="color:var(--ink-muted)">' + r.wn_id + '</td>'
      + '<td class="col-l" title="' + esc(r.wn_title||'') + '">'
        + esc(r.wn_title||'') + '</td>'
      + '<td class="td-muted">' + date + '</td>'
      + '<td>' + (r.wn_readcnt||0) + '</td>'
      + '<td style="text-align:center">'
        + '<button class="btn-icon" onclick="toggleWeeklyHidden(' + r.wn_id + ',' + !r.wn_hidden + ')" title="' + (r.wn_hidden?'게시':'비공개로 전환') + '">' + pubTxt + '</button></td>'
      + '<td><button class="btn-icon" onclick="deleteWeekly(' + r.wn_id + ')">🗑️</button></td>'
      + '</tr>';
  }).join('');
}

function openWeeklyUpload() {
  _weeklyFile = null;
  document.getElementById('weeklyFileInput').value = '';
  document.getElementById('weeklySelectedName').style.display = 'none';
  document.getElementById('weeklyUploadProgress').className = 'upload-progress';
  document.getElementById('weeklyUploadError').className = 'edit-error';
  var btn = document.getElementById('weeklyUploadBtn');
  btn.disabled = true;
  btn.style.opacity = '0.45';
  document.getElementById('weeklyUploadModal').style.display = 'flex';
}

function closeWeeklyUpload() {
  document.getElementById('weeklyUploadModal').style.display = 'none';
  _weeklyFile = null;
}

function handleWeeklyUploadBackdrop(e) {
  if (e.target === document.getElementById('weeklyUploadModal')) closeWeeklyUpload();
}

function handleWeeklyFileSelect(e) {
  var f = e.target.files[0];
  if (f) setWeeklyFile(f);
}

function handleWeeklyDrop(e) {
  e.preventDefault();
  document.getElementById('weeklyDropArea').classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') {
    setWeeklyFile(f);
  } else {
    var err = document.getElementById('weeklyUploadError');
    err.textContent = 'PDF 파일만 등록 가능합니다';
    err.className = 'edit-error show';
  }
}

function setWeeklyFile(f) {
  _weeklyFile = f;
  var nm = document.getElementById('weeklySelectedName');
  nm.textContent = '📄 ' + f.name + '  (' + Math.round(f.size / 1024) + 'KB)';
  nm.style.display = 'block';
  var btn = document.getElementById('weeklyUploadBtn');
  btn.disabled = false;
  btn.style.opacity = '1';
  document.getElementById('weeklyUploadError').className = 'edit-error';
}

async function uploadWeeklyFile() {
  if (!_weeklyFile) return;
  var btn   = document.getElementById('weeklyUploadBtn');
  var prog  = document.getElementById('weeklyUploadProgress');
  var errEl = document.getElementById('weeklyUploadError');
  btn.disabled = true; btn.style.opacity = '0.45';
  errEl.className = 'edit-error';

  var ts           = new Date().toISOString().replace(/[-T:.Z]/g,'').substring(0,15);
  // Storage 키는 ASCII만 허용(한글 불가) → 타임스탬프+확장자. 원본명은 wn_title에 보존
  var ext          = (_weeklyFile.name.match(/\.[^.]+$/) || ['.pdf'])[0].toLowerCase();
  var safeFileName = ts + ext;

  // Step 1: 서버(DB 함수)에서 서명 업로드 URL 발급
  prog.textContent = '업로드 URL 발급 중...';
  prog.className = 'upload-progress show';

  var urlResult = await callRpc('get_weekly_upload_url', {
    p_session_token: getToken(),
    p_filename: safeFileName
  });
  if (!urlResult || urlResult.error) {
    prog.className = 'upload-progress';
    errEl.textContent = '업로드 URL 발급 실패: ' + (urlResult && urlResult.error || '서버 오류');
    errEl.className = 'edit-error show';
    btn.disabled = false; btn.style.opacity = '1';
    return;
  }

  // Step 2: 서명 URL로 파일 직접 업로드
  // Supabase 응답: { url: "/object/upload/sign/weekly-pdfs/..?token=.." }
  prog.textContent = '파일 업로드 중...';
  try {
    var signedPath = urlResult.url || urlResult.signedURL || urlResult.signedUrl || '';
    if (!signedPath) throw new Error('서명 URL 응답 형식 오류: ' + JSON.stringify(urlResult));
    var signedUrl = signedPath.indexOf('http') === 0
      ? signedPath
      : SUPABASE_URL + '/storage/v1' + (signedPath.charAt(0) === '/' ? '' : '/') + signedPath;
    var resp = await fetch(signedUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/pdf' },
      body: _weeklyFile
    });
    if (!resp.ok) {
      var errText = await resp.text();
      throw new Error('HTTP ' + resp.status + ' — ' + errText);
    }
  } catch(e) {
    prog.className = 'upload-progress';
    errEl.textContent = '파일 업로드 실패: ' + e.message;
    errEl.className = 'edit-error show';
    btn.disabled = false; btn.style.opacity = '1';
    return;
  }

  // Step 3: DB 메타 등록
  prog.textContent = 'DB 등록 중...';
  var regResult = await callRpc('register_weekly', {
    p_session_token: getToken(),
    p_title:         _weeklyFile.name,
    p_file_path:     safeFileName
  });

  prog.className = 'upload-progress';
  if (!regResult || !regResult.success) {
    errEl.textContent = 'DB 등록 실패: ' + (regResult && regResult.error || '서버 오류');
    errEl.className = 'edit-error show';
    btn.disabled = false; btn.style.opacity = '1';
    return;
  }

  closeWeeklyUpload();
  loadAdminWeekly();
}

async function toggleWeeklyHidden(id, hidden) {
  var r = await callRpc('toggle_weekly_hidden', {
    p_session_token: getToken(), p_id: id, p_hidden: hidden
  });
  if (r && r.success) loadAdminWeekly();
  else alert('변경 실패');
}

async function deleteWeekly(id) {
  if (!confirm('삭제하시겠습니까?\n(목록 + 저장된 PDF 파일이 함께 삭제됩니다)')) return;
  var r = await callRpc('delete_weekly', { p_session_token: getToken(), p_id: id });
  if (r && r.success) loadAdminWeekly();
  else alert('삭제 실패: ' + (r && r.error || '서버 오류'));
}

// ─────────────────────────────────────────────
// 세션 관리 (localStorage — 창 간 공유)
// ─────────────────────────────────────────────
const SESSION_KEY = 'adm_id';
const SESSION_NAME = 'adm_name';
const SESSION_SUPER = 'adm_super';
const SESSION_TOKEN = 'adm_token';

function getAdminId()    { return localStorage.getItem(SESSION_KEY); }
function getAdminName()  { return localStorage.getItem(SESSION_NAME); }
function getToken()      { return localStorage.getItem(SESSION_TOKEN); }
function isSuperAdmin()  { return localStorage.getItem(SESSION_SUPER) === '1'; }

function saveSession(adminId, name, isSuper, token) {
  localStorage.setItem(SESSION_KEY,   adminId);
  localStorage.setItem(SESSION_NAME,  name);
  localStorage.setItem(SESSION_SUPER, isSuper ? '1' : '0');
  localStorage.setItem(SESSION_TOKEN, token);
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
  localStorage.removeItem(SESSION_NAME);
  localStorage.removeItem(SESSION_SUPER);
  localStorage.removeItem(SESSION_TOKEN);
}

// ─────────────────────────────────────────────
// 5분 무활동 자동 로그아웃
// ─────────────────────────────────────────────
const IDLE_TIMEOUT = 5 * 60 * 1000; // 5분
const TOUCH_THROTTLE = 60 * 1000;   // 서버 세션 연장 최소 간격 1분
var _idleTimer = null;
var _lastTouch = 0;

function touchSession() {
  const token = getToken();
  if (!token) return;
  const t = new Date().getTime();
  if (t - _lastTouch < TOUCH_THROTTLE) return;
  _lastTouch = t;
  callRpc('touch_admin_session', { p_session_token: token });
}

function resetIdleTimer() {
  touchSession();
  clearTimeout(_idleTimer);
  _idleTimer = setTimeout(function() {
    const token = getToken();
    if (token) callRpc('logout_admin_session', { p_session_token: token });
    clearSession();
    alert('5분 동안 활동이 없어 자동 로그아웃되었습니다.');
    showLoginView();
  }, IDLE_TIMEOUT);
}

function startIdleTimer() {
  ['mousemove','keydown','mousedown','touchstart','scroll'].forEach(function(ev) {
    document.addEventListener(ev, resetIdleTimer, { passive: true });
  });
  resetIdleTimer();
}

// ─────────────────────────────────────────────
// 페이지 로드: 세션 있으면 대시보드 즉시 로드
// ─────────────────────────────────────────────
window.addEventListener('load', async function() {
  const token = getToken();
  if (!token) return; // 로그인 폼 유지

  showLoginLoading(true);
  const data = await callRpc('get_admin_dashboard_data', { p_session_token: token });
  showLoginLoading(false);

  // 네트워크 오류(null)는 세션 유지, 명시적 인증 실패만 로그아웃
  if (data && data.error === 'UNAUTHORIZED') { clearSession(); return; }
  if (!data) return; // 네트워크 오류 — 로그인 폼으로 (세션 유지)
  renderDashboard(data);
  loadAdminNotices();
  loadAdminWeekly();
  startIdleTimer();
});

// ─────────────────────────────────────────────
// 로그인
// ─────────────────────────────────────────────
async function doLogin() {
  const adminId  = document.getElementById('inputId').value.trim();
  const password = document.getElementById('inputPw').value;
  if (!adminId || !password) { showLoginError('아이디와 비밀번호를 입력하세요'); return; }

  showLoginLoading(true);
  hideLoginError();

  // 1. 비밀번호 검증
  const login = await callRpc('process_admin_login', { p_admin_id: adminId, p_password: password });
  if (!login || !login.success) {
    showLoginLoading(false);
    const msgs = { AUTH_FAILED:'아이디 또는 비밀번호가 올바르지 않습니다',
                   LOCKED:'계정이 잠겼습니다',
                   ALREADY_ACTIVE:'이미 다른 곳에서 접속 중입니다' };
    showLoginError(msgs[login && login.error] || '로그인 실패');
    document.getElementById('inputPw').value = '';
    return;
  }

  saveSession(login.admin_id, login.admin_name, login.admin_is_super_admin, login.session_token);
  document.getElementById('inputPw').value = '';

  // 2. 대시보드 데이터 로드
  const data = await callRpc('get_admin_dashboard_data', { p_session_token: getToken() });
  showLoginLoading(false);

  if (!data || data.error) { showLoginError('대시보드 로드 실패'); return; }
  renderDashboard(data);
  loadAdminWeekly();
  startIdleTimer();
}

// Enter 키
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (document.activeElement && document.activeElement.tagName) === 'INPUT'
      && document.getElementById('loginPage').style.display !== 'none') {
    e.preventDefault(); doLogin();
  }
});

// ─────────────────────────────────────────────
// 로그아웃
// ─────────────────────────────────────────────
async function doLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  const token = getToken();
  if (token) await callRpc('logout_admin_session', { p_session_token: token });
  clearSession();
  window.close();
}

// ─────────────────────────────────────────────
// 대시보드 렌더링
// ─────────────────────────────────────────────
function renderDashboard(data) {
  const adminName  = getAdminName();
  const superAdmin = isSuperAdmin();

  document.getElementById('navName').textContent = adminName;

  const d = new Date();
  document.getElementById('pageDate').textContent =
    d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') + ' 기준';

  document.getElementById('statToday').textContent  = data.today_count  ?? 0;
  if (superAdmin && data.admin_logins) {
    document.getElementById('superSection').style.display = 'block';
    renderAdminLogins(data.admin_logins);
  }

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminApp').style.display  = 'block';
}

// ─────────────────────────────────────────────
// 테이블 렌더링
// ─────────────────────────────────────────────
function renderAdminLogins(rows) {
  const tbody = document.getElementById('adminTbody');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">이력 없음</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(r) {
    const date = r.admin_last_login_at
      ? r.admin_last_login_at.substring(0,16).replace('T',' ')
      : '—';
    const badge = r.admin_is_super_admin
      ? '<span class="badge b-super">슈퍼관리자</span>'
      : '<span class="badge b-admin">관리자</span>';
    return '<tr>'
      + '<td>' + esc(r.admin_name || '') + '</td>'
      + '<td class="td-muted">' + esc(r.admin_email || '') + '</td>'
      + '<td>' + badge + '</td>'
      + '<td class="td-muted">' + date + '</td>'
      + '</tr>';
  }).join('');
}

// ─────────────────────────────────────────────
// UI 헬퍼
// ─────────────────────────────────────────────
function showLoginView() {
  document.getElementById('adminApp').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('inputPw').value = '';
}

function showLoginLoading(on) {
  const sp = document.getElementById('loginSpinner');
  const btn = document.getElementById('btnLogin');
  sp.className = on ? 'spinner-wrap show' : 'spinner-wrap';
  btn.disabled = on;
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.className = 'login-error show';
}

function hideLoginError() {
  document.getElementById('loginError').className = 'login-error';
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
